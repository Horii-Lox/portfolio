<!doctype html>
<html>
  <head>

    <link rel="stylesheet" href="../styles/destyle.css" />

  <body>
    <header>

        <div class="header_nav">

        </div>
        <div class="main_images">

            <img class="main_img_item" src="../images/image (1).jpg" alt="" />

          <div class="main_img_content">

          <div class="main_img_content">
            <img class="main_img_item" src="../images/image (6).jpg" alt="" />

        <a class="main_but" href=""

        /></a>

        <nav class="footer_nav">
          <a class="footer_link" href=""
            ><img class="link_x" src="../images/v6-icon (free).png" alt="link_x"

          <a class="footer_link" href=""

          /></a>
          <a class="footer_link" href=""
            ><img class="link_Git" src="../images/icon (1).png" alt="link_git"
